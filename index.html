<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ollama AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #161627;
      border-bottom: 1px solid #2a2a45;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar .brand {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar select {
      background: #1e1e38;
      color: #c084fc;
      border: 1px solid #3a3a60;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      min-width: 200px;
    }

    .topbar select:focus { border-color: #7c5cfc; }

    .topbar .clear-btn {
      background: transparent;
      border: 1px solid #3a3a60;
      color: #888;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .topbar .clear-btn:hover { border-color: #7c5cfc; color: #c084fc; }

    /* ── CHAT AREA ── */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: #3a3a60; border-radius: 3px; }

    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .user .avatar  { background: linear-gradient(135deg, #7c5cfc, #c084fc); }
    .bot  .avatar  { background: linear-gradient(135deg, #1e3a5f, #2563eb); }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: calc(100% - 60px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: linear-gradient(135deg, #7c5cfc22, #7c5cfc44);
      border: 1px solid #7c5cfc55;
      border-top-right-radius: 4px;
    }

    .bot .bubble {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-top-left-radius: 4px;
    }

    /* Typing dots */
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      margin: 0 2px;
      background: #7c5cfc;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-8px); }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 16px 20px;
      background: #161627;
      border-top: 1px solid #2a2a45;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: #1e1e38;
      border: 1px solid #3a3a60;
      color: #e0e0e0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 140px;
      overflow-y: auto;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #7c5cfc; }
    #user-input::placeholder { color: #555; }

    #send-btn {
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover  { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Welcome message */
    .welcome {
      text-align: center;
      color: #444;
      margin: auto;
      padding: 40px 20px;
    }
    .welcome h2 { font-size: 2rem; color: #7c5cfc; margin-bottom: 8px; }
    .welcome p  { font-size: 1rem; color: #555; }

    /* Status bar */
    #status-bar {
      text-align: center;
      font-size: 0.78rem;
      color: #444;
      padding: 4px;
      background: #0f0f1a;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">⚡ Ollama AI Chat</div>
  <select id="model-select"><option>Loading models...</option></select>
  <button class="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
</div>

<!-- CHAT BOX -->
<div id="chat-box">
  <div class="welcome" id="welcome-msg">
    <h2>Hello! 👋</h2>
    <p>Select a model above and start chatting with Ollama AI.</p>
  </div>
</div>

<!-- STATUS BAR -->
<div id="status-bar">Ready</div>

<!-- INPUT BAR -->
<div style="background:#0f0f1a; padding: 0 0 8px 0;">
  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Type your message... (Enter to send, Shift+Enter for new line)"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#9658;</button>
  </div>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const API_KEY  = "9c4159e43d624f12985c32e10fa11f6c.6ZpOFJvp3JDIQSKSvh4Oe2lA";
  const API_URL  = "https://ollama.com/v1/chat/completions";
  const MODELS_URL = "https://ollama.com/v1/models";

  let messages = [
    { role: "system", content: "You are a helpful and friendly AI assistant. Answer clearly and helpfully." }
  ];
  let isStreaming = false;

  // ── Load Models ──────────────────────────────────────────────
  async function loadModels() {
    const sel = document.getElementById("model-select");
    try {
      const res = await fetch(MODELS_URL, {
        headers: { "Authorization": `Bearer ${API_KEY}` }
      });
      const data = await res.json();
      sel.innerHTML = "";
      data.data.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.id;
        if (m.id === "gpt-oss:20b") opt.selected = true;
        sel.appendChild(opt);
      });
      setStatus("✅ Models loaded! Ready to chat.");
    } catch (e) {
      sel.innerHTML = "<option value='gpt-oss:20b'>gpt-oss:20b</option>";
      setStatus("⚠️ Could not load model list. Using default.");
    }
  }
  loadModels();

  function setStatus(msg) {
    document.getElementById("status-bar").textContent = msg;
  }

  // ── Auto resize textarea ──────────────────────────────────────
  const textarea = document.getElementById("user-input");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });

  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Add message bubble ────────────────────────────────────────
  function addMessage(role, text) {
    const welcome = document.getElementById("welcome-msg");
    if (welcome) welcome.remove();

    const box = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "🧑" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  // ── Typing indicator ─────────────────────────────────────────
  function addTyping() {
    const welcome = document.getElementById("welcome-msg");
    if (welcome) welcome.remove();

    const box = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble typing-dots";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(bubble);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row;
  }

  // ── Send Message ─────────────────────────────────────────────
  async function sendMessage() {
    if (isStreaming) return;

    const input   = document.getElementById("user-input");
    const model   = document.getElementById("model-select").value;
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";
    isStreaming = true;
    document.getElementById("send-btn").disabled = true;
    setStatus("🤖 AI is thinking...");

    messages.push({ role: "user", content: message });
    addMessage("user", message);
    const typingRow = addTyping();

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
          stream: true,
          temperature: 0.7
        })
      });

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let botBubble = null;
      let fullText  = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const text  = decoder.decode(value);
        const lines = text.split("\n");

        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const chunk = line.slice(6).trim();
            if (chunk === "[DONE]") break;
            try {
              const data  = JSON.parse(chunk);
              const delta = data.choices[0].delta.content || "";
              if (delta) {
                if (!botBubble) {
                  typingRow.remove();
                  botBubble = addMessage("bot", "");
                }
                fullText += delta;
                botBubble.textContent = fullText;
                document.getElementById("chat-box").scrollTop = 99999;
              }
            } catch (_) {}
          }
        }
      }

      if (typingRow.parentNode) typingRow.remove();
      if (!botBubble) addMessage("bot", "(No response)");

      messages.push({ role: "assistant", content: fullText });
      setStatus("✅ Ready");

    } catch (e) {
      typingRow.remove();
      addMessage("bot", "❌ Error: " + e.message);
      messages.pop();
      setStatus("❌ Error occurred.");
    }

    isStreaming = false;
    document.getElementById("send-btn").disabled = false;
    input.focus();
  }

  // ── Clear Chat ───────────────────────────────────────────────
  function clearChat() {
    messages = [
      { role: "system", content: "You are a helpful and friendly AI assistant. Answer clearly and helpfully." }
    ];
    const box = document.getElementById("chat-box");
    box.innerHTML = `
      <div class="welcome" id="welcome-msg">
        <h2>Hello! 👋</h2>
        <p>Select a model above and start chatting with Ollama AI.</p>
      </div>`;
    setStatus("🗑 Chat cleared. Ready!");
  }
</script>
</body>
</html>
