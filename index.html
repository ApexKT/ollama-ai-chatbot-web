<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ollama AI Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f0f1a; --bg2: #161627; --bg3: #1a1a2e; --bg4: #1e1e38;
      --border: #2a2a45; --border2: #3a3a60;
      --text: #e0e0e0; --text2: #aaa; --text3: #555;
      --purple: #7c5cfc; --purple2: #c084fc;
      --user-bg: #7c5cfc22; --user-border: #7c5cfc55;
    }
    [data-theme="light"] {
      --bg: #f0f2ff; --bg2: #ffffff; --bg3: #f8f8ff; --bg4: #eeeeff;
      --border: #d0d0f0; --border2: #b0b0e0;
      --text: #1a1a2e; --text2: #444; --text3: #888;
      --user-bg: #7c5cfc22; --user-border: #7c5cfc55;
    }

    * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s, color 0.3s; }

    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── PASSWORD OVERLAY ── */
    #pw-overlay {
      position:fixed; inset:0; background:#0f0f1aee; z-index:999;
      display:flex; align-items:center; justify-content:center;
    }
    #pw-overlay.hidden { display:none; }
    .pw-box {
      background:var(--bg2); border:1px solid var(--border2); border-radius:16px;
      padding:40px; text-align:center; width:320px;
    }
    .pw-box h2 { color:var(--purple); margin-bottom:8px; font-size:1.4rem; }
    .pw-box p  { color:var(--text2); font-size:0.85rem; margin-bottom:20px; }
    .pw-box input {
      width:100%; padding:10px 14px; border-radius:8px;
      border:1px solid var(--border2); background:var(--bg4);
      color:var(--text); font-size:1rem; outline:none; margin-bottom:12px;
    }
    .pw-box button {
      width:100%; padding:10px; border-radius:8px; border:none;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:#fff; font-size:1rem; cursor:pointer;
    }
    .pw-error { color:#f87171; font-size:0.82rem; margin-top:8px; }

    /* ── LAYOUT ── */
    .app { display:flex; flex:1; overflow:hidden; }

    /* ── SIDEBAR ── */
    #sidebar {
      width:260px; background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; transition:width 0.3s;
      overflow:hidden;
    }
    #sidebar.collapsed { width:0; }
    .sidebar-header {
      padding:14px 16px; font-weight:700; color:var(--purple);
      border-bottom:1px solid var(--border); display:flex;
      align-items:center; justify-content:space-between; white-space:nowrap;
    }
    .new-chat-btn {
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      border:none; color:#fff; padding:6px 12px; border-radius:8px;
      cursor:pointer; font-size:0.8rem; white-space:nowrap;
    }
    #chat-list { flex:1; overflow-y:auto; padding:8px; }
    .chat-item {
      padding:10px 12px; border-radius:8px; cursor:pointer;
      font-size:0.85rem; color:var(--text2); margin-bottom:4px;
      display:flex; align-items:center; justify-content:space-between;
      border:1px solid transparent; white-space:nowrap; overflow:hidden;
    }
    .chat-item:hover, .chat-item.active {
      background:var(--bg4); border-color:var(--border2); color:var(--text);
    }
    .chat-item span { overflow:hidden; text-overflow:ellipsis; flex:1; }
    .chat-item .del-btn {
      background:none; border:none; color:#f87171; cursor:pointer;
      font-size:0.8rem; padding:0 4px; display:none;
    }
    .chat-item:hover .del-btn { display:block; }

    /* ── MAIN ── */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* ── TOPBAR ── */
    .topbar {
      display:flex; align-items:center; padding:10px 16px;
      background:var(--bg2); border-bottom:1px solid var(--border);
      gap:10px; flex-wrap:wrap;
    }
    .topbar .brand {
      font-size:1.1rem; font-weight:700;
      background:linear-gradient(90deg,var(--purple),var(--purple2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      white-space:nowrap;
    }
    .topbar select {
      background:var(--bg4); color:var(--purple2); border:1px solid var(--border2);
      border-radius:8px; padding:6px 10px; font-size:0.85rem; cursor:pointer;
      outline:none; flex:1; min-width:150px; max-width:220px;
    }
    .icon-btn {
      background:transparent; border:1px solid var(--border2); color:var(--text2);
      padding:6px 10px; border-radius:8px; cursor:pointer; font-size:0.85rem;
      transition:all 0.2s; white-space:nowrap;
    }
    .icon-btn:hover { border-color:var(--purple); color:var(--purple2); }

    /* ── CHAT BOX ── */
    #chat-box {
      flex:1; overflow-y:auto; padding:20px 16px;
      display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth;
    }
    #chat-box::-webkit-scrollbar { width:5px; }
    #chat-box::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    .msg-row { display:flex; gap:10px; max-width:780px; width:100%; margin:0 auto; }
    .msg-row.user { flex-direction:row-reverse; }

    .avatar {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:700; flex-shrink:0;
    }
    .user .avatar { background:linear-gradient(135deg,var(--purple),var(--purple2)); color:#fff; }
    .bot  .avatar { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; }

    .bubble-wrap { display:flex; flex-direction:column; max-width:calc(100% - 50px); }
    .msg-row.user .bubble-wrap { align-items:flex-end; }

    .bubble {
      padding:11px 15px; border-radius:16px; line-height:1.65;
      font-size:0.93rem; word-break:break-word; position:relative;
    }
    .user .bubble {
      background:linear-gradient(135deg,var(--user-bg),#7c5cfc33);
      border:1px solid var(--user-border); border-top-right-radius:4px;
    }
    .bot .bubble {
      background:var(--bg3); border:1px solid var(--border); border-top-left-radius:4px;
    }

    /* Markdown inside bubble */
    .bubble h1,.bubble h2,.bubble h3 { margin:8px 0 4px; color:var(--purple2); }
    .bubble p  { margin-bottom:6px; }
    .bubble ul,.bubble ol { padding-left:20px; margin-bottom:6px; }
    .bubble code {
      background:var(--bg2); padding:2px 6px; border-radius:4px;
      font-family:monospace; font-size:0.88rem; color:var(--purple2);
    }
    .bubble pre {
      background:var(--bg2); border:1px solid var(--border2); border-radius:8px;
      padding:12px; overflow-x:auto; margin:8px 0;
      position:relative;
    }
    .bubble pre code { background:none; padding:0; color:var(--text); }
    .copy-code-btn {
      position:absolute; top:6px; right:8px; background:var(--purple);
      color:#fff; border:none; border-radius:5px; padding:2px 8px;
      font-size:0.72rem; cursor:pointer; opacity:0.8;
    }
    .copy-code-btn:hover { opacity:1; }

    .msg-actions {
      display:flex; gap:6px; margin-top:5px; opacity:0; transition:opacity 0.2s;
    }
    .bubble-wrap:hover .msg-actions { opacity:1; }
    .msg-actions button {
      background:var(--bg4); border:1px solid var(--border2); color:var(--text2);
      padding:3px 9px; border-radius:6px; font-size:0.75rem; cursor:pointer;
    }
    .msg-actions button:hover { border-color:var(--purple); color:var(--purple2); }

    /* Typing dots */
    .typing-dots span {
      display:inline-block; width:7px; height:7px; margin:0 2px;
      background:var(--purple); border-radius:50%; animation:bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

    /* ── SETTINGS PANEL ── */
    #settings-panel {
      background:var(--bg2); border-top:1px solid var(--border);
      padding:12px 20px; display:none; flex-wrap:wrap; gap:16px; align-items:center;
    }
    #settings-panel.open { display:flex; }
    .setting-group { display:flex; flex-direction:column; gap:4px; min-width:180px; }
    .setting-group label { font-size:0.75rem; color:var(--text2); }
    .setting-group input[type=range] { accent-color:var(--purple); }
    .setting-group input[type=text], .setting-group textarea {
      background:var(--bg4); border:1px solid var(--border2); color:var(--text);
      border-radius:6px; padding:6px 10px; font-size:0.83rem; outline:none;
      font-family:inherit;
    }
    .setting-group input[type=text]:focus, .setting-group textarea:focus {
      border-color:var(--purple);
    }
    .setting-val { font-size:0.78rem; color:var(--purple2); }

    /* ── STATUS BAR ── */
    #status-bar {
      text-align:center; font-size:0.75rem; color:var(--text3);
      padding:4px; background:var(--bg);
    }

    /* ── INPUT BAR ── */
    .input-wrap { background:var(--bg); padding:0 0 6px; }
    .input-bar {
      display:flex; align-items:flex-end; gap:8px;
      padding:12px 16px; background:var(--bg2);
      border-top:1px solid var(--border);
      max-width:840px; width:100%; margin:0 auto;
    }
    #user-input {
      flex:1; background:var(--bg4); border:1px solid var(--border2);
      color:var(--text); border-radius:12px; padding:10px 14px;
      font-size:0.93rem; resize:none; outline:none; max-height:120px;
      overflow-y:auto; font-family:inherit; line-height:1.5;
      transition:border-color 0.2s;
    }
    #user-input:focus { border-color:var(--purple); }
    #user-input::placeholder { color:var(--text3); }
    #send-btn {
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      border:none; color:#fff; width:42px; height:42px; border-radius:11px;
      font-size:1.1rem; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:opacity 0.2s,transform 0.1s;
    }
    #send-btn:hover  { opacity:0.85; }
    #send-btn:active { transform:scale(0.95); }
    #send-btn:disabled { opacity:0.35; cursor:not-allowed; }

    /* ── WELCOME ── */
    .welcome { text-align:center; margin:auto; padding:40px 20px; }
    .welcome h2 { font-size:1.9rem; color:var(--purple); margin-bottom:8px; }
    .welcome p  { font-size:0.95rem; color:var(--text3); }

    /* ── MOBILE ── */
    @media(max-width:600px) {
      #sidebar { position:absolute; z-index:10; height:100%; }
      .topbar .brand { font-size:1rem; }
      .topbar select { max-width:140px; }
    }
  </style>
</head>
<body>

<!-- ── PASSWORD OVERLAY ── -->
<div id="pw-overlay">
  <div class="pw-box">
    <h2>&#128274; Ollama AI Chat</h2>
    <p>Enter password to access the chatbot</p>
    <input type="password" id="pw-input" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPw()" />
    <button onclick="checkPw()">Unlock</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span>&#128172; Chats</span>
      <button class="new-chat-btn" onclick="newChat()">+ New</button>
    </div>
    <div id="chat-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle Sidebar">&#9776;</button>
      <div class="brand">&#9889; Ollama AI</div>
      <select id="model-select"></select>
      <button class="icon-btn" onclick="toggleSettings()">&#9881; Settings</button>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">&#9790; Dark</button>
      <button class="icon-btn" onclick="saveChat()">&#128190; Save</button>
      <button class="icon-btn" onclick="clearChat()">&#128465; Clear</button>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel">
      <div class="setting-group">
        <label>&#128272; API Key</label>
        <input type="text" id="api-key-input" placeholder="Paste your Ollama API key..." />
      </div>
      <div class="setting-group">
        <label>&#128274; Site Password</label>
        <input type="text" id="new-pw-input" placeholder="Set new password..." />
        <button class="icon-btn" style="margin-top:4px" onclick="setNewPw()">Set Password</button>
      </div>
      <div class="setting-group">
        <label>&#127777; Temperature: <span class="setting-val" id="temp-val">0.7</span></label>
        <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.7"
               oninput="document.getElementById('temp-val').textContent=this.value" />
      </div>
      <div class="setting-group">
        <label>&#128218; Max Tokens: <span class="setting-val" id="tokens-val">2048</span></label>
        <input type="range" id="tokens-slider" min="256" max="8192" step="256" value="2048"
               oninput="document.getElementById('tokens-val').textContent=this.value" />
      </div>
      <div class="setting-group" style="min-width:260px">
        <label>&#129302; System Prompt</label>
        <textarea id="system-prompt" rows="3" style="width:100%">You are a helpful and friendly AI assistant. Answer clearly and helpfully.</textarea>
        <button class="icon-btn" style="margin-top:4px" onclick="applySystem()">Apply Prompt</button>
      </div>
      <div class="setting-group">
        <label>&#127760; Language</label>
        <select id="lang-select" onchange="setLang(this.value)"
                style="background:var(--bg4);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;">
          <option value="en">English</option>
          <option value="si">Sinhala (සිංහල)</option>
        </select>
      </div>
    </div>

    <!-- CHAT BOX -->
    <div id="chat-box">
      <div class="welcome" id="welcome-msg">
        <h2 id="welcome-title">Hello! &#128075;</h2>
        <p id="welcome-sub">Select a model and start chatting with Ollama AI.</p>
      </div>
    </div>

    <div id="status-bar">Ready</div>

    <!-- INPUT -->
    <div class="input-wrap">
      <div class="input-bar">
        <textarea id="user-input" rows="1" placeholder="Type your message..."></textarea>
        <button id="send-btn" onclick="sendMessage()">&#9658;</button>
      </div>
    </div>

  </div><!-- .main -->
</div><!-- .app -->

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const PROXY      = "https://corsproxy.io/?url=";
const API_URL    = PROXY + encodeURIComponent("https://ollama.com/v1/chat/completions");
const MODELS_URL = PROXY + encodeURIComponent("https://ollama.com/v1/models");
const DEFAULT_KEY= "9c4159e43d624f12985c32e10fa11f6c.6ZpOFJvp3JDIQSKSvh4Oe2lA";
const DEFAULT_PW = "ollama123";

const FALLBACK_MODELS = [
  "gpt-oss:20b","gpt-oss:120b","gemma3:4b","gemma3:12b","gemma3:27b",
  "gemma4:31b","qwen3-next:80b","deepseek-v3.2","deepseek-v4-flash",
  "deepseek-v4-pro","mistral-large-3:675b","kimi-k2.5","kimi-k2.6",
  "kimi-k2-thinking","glm-4.6","glm-4.7","glm-5","glm-5.1",
  "devstral-small-2:24b","devstral-2:123b","ministral-3:3b","ministral-3:8b",
  "ministral-3:14b","nemotron-3-nano:30b","nemotron-3-super",
  "minimax-m2","minimax-m2.1","minimax-m2.5","minimax-m2.7",
  "cogito-2.1:671b","rnj-1:8b","qwen3-coder:480b","qwen3-vl:235b",
  "qwen3.5:397b","gemini-3-flash-preview"
];

// ─── STATE ─────────────────────────────────────────────────────
let isStreaming = false;
let currentChatId = null;
let chatStore = JSON.parse(localStorage.getItem("chats") || "{}");
let messages = [];

// ─── PASSWORD ──────────────────────────────────────────────────
function getSitePw() { return localStorage.getItem("site_pw") || DEFAULT_PW; }
function checkPw() {
  const val = document.getElementById("pw-input").value;
  if (val === getSitePw()) {
    sessionStorage.setItem("unlocked","1");
    document.getElementById("pw-overlay").classList.add("hidden");
  } else {
    document.getElementById("pw-error").textContent = "Wrong password!";
  }
}
function setNewPw() {
  const v = document.getElementById("new-pw-input").value.trim();
  if (!v) return;
  localStorage.setItem("site_pw", v);
  alert("Password updated to: " + v);
}
if (sessionStorage.getItem("unlocked") === "1") {
  document.getElementById("pw-overlay").classList.add("hidden");
}

// ─── THEME ─────────────────────────────────────────────────────
let isDark = localStorage.getItem("theme") !== "light";
function applyTheme() {
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  document.getElementById("theme-btn").textContent = isDark ? "☀ Light" : "🌙 Dark";
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem("theme", isDark ? "dark" : "light");
  applyTheme();
}
applyTheme();

// ─── SIDEBAR ───────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
}

// ─── SETTINGS ──────────────────────────────────────────────────
function toggleSettings() {
  document.getElementById("settings-panel").classList.toggle("open");
}
function applySystem() {
  const sp = document.getElementById("system-prompt").value.trim();
  messages = messages.filter(m => m.role !== "system");
  messages.unshift({ role:"system", content: sp });
  setStatus("System prompt applied!");
}
function getApiKey() {
  const k = document.getElementById("api-key-input").value.trim();
  return k || DEFAULT_KEY;
}
function getTemp()   { return parseFloat(document.getElementById("temp-slider").value); }
function getTokens() { return parseInt(document.getElementById("tokens-slider").value); }

// ─── LANGUAGE ──────────────────────────────────────────────────
const LANG = {
  en: { welcome:"Hello! 👋", sub:"Select a model and start chatting.", ready:"Ready",
        thinking:"AI is thinking...", cleared:"Chat cleared.", prompt:"Type your message..." },
  si: { welcome:"ආයුබෝවන්! 👋", sub:"Model එකක් තෝරා chat කරන්න.", ready:"සූදානම්",
        thinking:"AI සිතමින් ඉන්නවා...", cleared:"Chat ඉවතලන්නා.", prompt:"ඔබේ පණිවිඩය ලියන්න..." }
};
let lang = localStorage.getItem("lang") || "en";
function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  applyLang();
}
function applyLang() {
  const t = LANG[lang];
  const wt = document.getElementById("welcome-title");
  const ws = document.getElementById("welcome-sub");
  if (wt) wt.textContent = t.welcome;
  if (ws) ws.textContent = t.sub;
  document.getElementById("user-input").placeholder = t.prompt;
  document.getElementById("lang-select").value = lang;
}
applyLang();

// ─── MODELS ────────────────────────────────────────────────────
async function loadModels() {
  const sel = document.getElementById("model-select");
  sel.innerHTML = "<option>Loading...</option>";
  try {
    const res  = await fetch(MODELS_URL, { headers:{ "Authorization":"Bearer "+getApiKey() } });
    const data = await res.json();
    const ids  = data.data.map(m => m.id);
    populateModels(sel, ids);
    setStatus(LANG[lang].ready);
  } catch(e) {
    populateModels(sel, FALLBACK_MODELS);
    setStatus(LANG[lang].ready);
  }
}
function populateModels(sel, list) {
  sel.innerHTML = "";
  list.forEach(m => {
    const o = document.createElement("option");
    o.value = o.textContent = m;
    if (m === "gpt-oss:20b") o.selected = true;
    sel.appendChild(o);
  });
}
loadModels();

// ─── CHAT STORE ────────────────────────────────────────────────
function saveStore() { localStorage.setItem("chats", JSON.stringify(chatStore)); }

function newChat() {
  const id   = "chat_" + Date.now();
  const name = "Chat " + new Date().toLocaleTimeString();
  chatStore[id] = { name, messages:[] };
  currentChatId = id;
  messages = [{ role:"system", content: document.getElementById("system-prompt").value }];
  saveStore();
  renderSidebar();
  clearChatBox();
  setStatus("New chat started.");
}

function loadChat(id) {
  currentChatId = id;
  messages = chatStore[id].messages.length ? [...chatStore[id].messages]
    : [{ role:"system", content: document.getElementById("system-prompt").value }];
  clearChatBox();
  // Re-render messages
  messages.forEach(m => {
    if (m.role === "system") return;
    const b = addMessage(m.role, "");
    renderBubble(b, m.content, m.role);
  });
  renderSidebar();
}

function deleteChat(id) {
  delete chatStore[id];
  saveStore();
  if (currentChatId === id) { currentChatId = null; messages = []; clearChatBox(); }
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById("chat-list");
  list.innerHTML = "";
  Object.entries(chatStore).reverse().forEach(([id, c]) => {
    const div = document.createElement("div");
    div.className = "chat-item" + (id === currentChatId ? " active" : "");
    div.innerHTML = `<span>${c.name}</span><button class="del-btn" onclick="event.stopPropagation();deleteChat('${id}')">✕</button>`;
    div.onclick = () => loadChat(id);
    list.appendChild(div);
  });
}
renderSidebar();

// ─── CHAT BOX ──────────────────────────────────────────────────
function clearChatBox() {
  document.getElementById("chat-box").innerHTML = `
    <div class="welcome" id="welcome-msg">
      <h2 id="welcome-title">${LANG[lang].welcome}</h2>
      <p id="welcome-sub">${LANG[lang].sub}</p>
    </div>`;
}

function setStatus(msg) { document.getElementById("status-bar").textContent = msg; }

function addMessage(role, text) {
  const welcome = document.getElementById("welcome-msg");
  if (welcome) welcome.remove();

  const box  = document.getElementById("chat-box");
  const row  = document.createElement("div");
  row.className = "msg-row " + role;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "U" : "AI";

  const wrap   = document.createElement("div");
  wrap.className = "bubble-wrap";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const actions = document.createElement("div");
  actions.className = "msg-actions";

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "Copy";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(bubble.innerText);
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy", 1500);
  };
  actions.appendChild(copyBtn);

  wrap.appendChild(bubble);
  wrap.appendChild(actions);
  row.appendChild(avatar);
  row.appendChild(wrap);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  return bubble;
}

function renderBubble(bubble, text, role) {
  if (role === "bot") {
    bubble.innerHTML = marked.parse(text);
    // Add copy buttons to code blocks
    bubble.querySelectorAll("pre").forEach(pre => {
      const btn = document.createElement("button");
      btn.className = "copy-code-btn";
      btn.textContent = "Copy";
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.innerText);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      };
      pre.style.position = "relative";
      pre.appendChild(btn);
    });
  } else {
    bubble.textContent = text;
  }
}

function addTyping() {
  const welcome = document.getElementById("welcome-msg");
  if (welcome) welcome.remove();
  const box  = document.getElementById("chat-box");
  const row  = document.createElement("div");
  row.className = "msg-row bot"; row.id = "typing-row";
  const avatar = document.createElement("div");
  avatar.className = "avatar"; avatar.textContent = "AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble typing-dots";
  bubble.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(avatar); row.appendChild(bubble);
  box.appendChild(row); box.scrollTop = box.scrollHeight;
  return row;
}

// ─── AUTO RESIZE TEXTAREA ──────────────────────────────────────
const textarea = document.getElementById("user-input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});
textarea.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ─── SEND MESSAGE ───────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input   = document.getElementById("user-input");
  const model   = document.getElementById("model-select").value;
  const message = input.value.trim();
  if (!message) return;

  // Auto-create chat if none active
  if (!currentChatId) {
    const id   = "chat_" + Date.now();
    const name = message.slice(0,28) + (message.length > 28 ? "..." : "");
    chatStore[id] = { name, messages:[] };
    currentChatId = id;
    if (!messages.length || messages[0].role !== "system") {
      messages.unshift({ role:"system", content: document.getElementById("system-prompt").value });
    }
    saveStore(); renderSidebar();
  }

  input.value = ""; input.style.height = "auto";
  isStreaming = true;
  document.getElementById("send-btn").disabled = true;
  setStatus(LANG[lang].thinking);

  messages.push({ role:"user", content:message });
  addMessage("user", message);
  const typingRow = addTyping();

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{ "Authorization":"Bearer "+getApiKey(), "Content-Type":"application/json" },
      body: JSON.stringify({
        model, messages,
        stream:true,
        temperature: getTemp(),
        max_tokens: getTokens()
      })
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let botBubble = null, fullText = "", buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const chunk = line.slice(6).trim();
        if (chunk === "[DONE]") break;
        try {
          const data  = JSON.parse(chunk);
          const delta = data.choices[0].delta.content || "";
          if (delta) {
            if (!botBubble) { typingRow.remove(); botBubble = addMessage("bot",""); }
            fullText += delta;
            botBubble.innerHTML = marked.parse(fullText);
            document.getElementById("chat-box").scrollTop = 99999;
          }
        } catch(_) {}
      }
    }

    if (typingRow.parentNode) typingRow.remove();
    if (!botBubble) botBubble = addMessage("bot","(No response)");

    // Add code copy buttons
    botBubble.querySelectorAll("pre").forEach(pre => {
      const btn = document.createElement("button");
      btn.className = "copy-code-btn"; btn.textContent = "Copy";
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.innerText);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      };
      pre.style.position = "relative"; pre.appendChild(btn);
    });

    messages.push({ role:"assistant", content:fullText });

    // Save to store
    if (currentChatId) {
      chatStore[currentChatId].messages = [...messages];
      saveStore();
    }
    setStatus(LANG[lang].ready);

  } catch(e) {
    if (typingRow.parentNode) typingRow.remove();
    addMessage("bot","Error: " + e.message);
    messages.pop();
    setStatus("Error occurred.");
  }

  isStreaming = false;
  document.getElementById("send-btn").disabled = false;
  input.focus();
}

// ─── CLEAR CHAT ────────────────────────────────────────────────
function clearChat() {
  messages = [{ role:"system", content: document.getElementById("system-prompt").value }];
  if (currentChatId) {
    chatStore[currentChatId].messages = [];
    saveStore();
  }
  clearChatBox();
  setStatus(LANG[lang].cleared);
}

// ─── SAVE CHAT ─────────────────────────────────────────────────
function saveChat() {
  const lines = messages.filter(m => m.role !== "system")
    .map(m => `[${m.role.toUpperCase()}]\n${m.content}\n`).join("\n---\n\n");
  const blob = new Blob([lines], { type:"text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ollama-chat-" + Date.now() + ".txt";
  a.click();
}

// ─── RESTORE THEME & LANG ──────────────────────────────────────
document.getElementById("lang-select").value = lang;
</script>
